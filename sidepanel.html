<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velrocity Sidepanel</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="elite-shell">
    
    <!-- PREMIUM HEADER -->
    <header class="header" style="padding-bottom: 0px;">
      <div class="brand" style="justify-content: space-between; width: 100%;">
        <div class="brand-info">
          <h1>Velrocity</h1>
          <p>Elite Workspace</p>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
          <div id="streakWrapper" class="hidden" style="display: flex; align-items: center; gap: 4px; padding: 4px 10px; background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); border-radius: 99px;">
            <span style="font-size: 14px;">🔥</span>
            <span id="streakCount" style="font-size: 12px; font-weight: 800; color: #fbbf24;">0</span>
          </div>
          <button id="themeToggle" class="btn-circle" style="background: rgba(var(--primary-rgb), 0.1); border: 1px solid var(--border); font-size: 16px;">🌓</button>
        </div>
      </div>
    </header>

    <!-- NAVIGATION TABS -->
    <div class="nav-wrapper">
      <nav class="nav-tabs">
        <button id="habitsTab" class="nav-btn active">Habits</button>
        <button id="goalsTab" class="nav-btn">Goals</button>
      </nav>
    </div>

    <!-- MAIN VIEWS AREA -->
    <main id="appMain" style="padding-top: 12px;">
      
      <!-- MY HABITS VIEW -->
      <section id="myPersonalHabitsView" class="app-view">
        <div id="myHabitsList" class="list-container">
          <!-- Habits injected here -->
        </div>
      </section>

      <!-- MY GOALS VIEW -->
      <section id="myGoalsView" class="app-view hidden">
        <form id="myGoalsForm" class="search-group" style="padding-bottom: 12px;">
          <div style="display: flex; gap: 8px;">
            <input type="text" id="myGoalInput" class="input-shell" placeholder="Quick goal..." required />
            <button type="submit" class="btn-primary" style="margin-top: 0; width: 80px;">Add</button>
          </div>
        </form>

        <div id="myGoalsList" class="list-container">
          <!-- Goals injected here -->
        </div>
      </section>

    </main>

    <!-- FOOTER NAV / ACTIONS -->
    <div style="position: fixed; bottom: 0; left: 0; right: 0; padding: 8px 20px; background: rgba(var(--bg-bottom), 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; z-index: 1000;">
      <button id="openWebApp" class="action-pill pending" style="border: none; background: transparent; padding: 0; opacity: 0.6; font-size: 10px;">Open Velrocity Dashboard</button>
      <button id="openSettings" class="btn-circle" style="background: rgba(255,255,255,0.03); border: 1px solid var(--border); font-size: 12px;">⚙️</button>
    </div>

  </div>

  <div id="statusContainer">
    <div id="statusMessage" class="status-toast hidden"></div>
  </div>

  <script type="module" src="sidepanel.js"></script>
</body>
</html>
