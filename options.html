<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velrocity | Extension Settings</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body style="display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px;">
    <main class="glass-panel" style="max-width: 500px; width: 100%; border-radius: var(--radius-lg); overflow: hidden;">
      
      <header class="header">
        <div class="brand">
          <div class="brand-logo">⚡</div>
          <div class="brand-info">
            <h1>Settings</h1>
            <p>Connection & Security</p>
          </div>
        </div>
      </header>

      <section style="padding: 32px 24px;">
        <div style="margin-bottom: 32px;">
          <h2 style="font-size: 20px; font-weight: 800; margin-bottom: 8px;">API Connectivity</h2>
          <p style="font-size: 13px; color: rgb(var(--muted-text)); font-weight: 500;">Link your browser extension to your Velrocity account.</p>
        </div>

        <form id="settingsForm" style="display: flex; flex-direction: column; gap: 24px;">
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: rgb(var(--primary));">API Base URL</label>
            <input id="apiBase" type="url" class="input-shell" placeholder="https://velrocity.vercel.app/api" />
          </div>
          
          <div style="display: flex; flex-direction: column; gap: 8px;">
            <label style="font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; color: rgb(var(--primary));">Authentication Token</label>
            <input id="authToken" type="password" class="input-shell" placeholder="Paste your Elite JWT token..." />
            <p style="font-size: 11px; color: rgb(var(--muted-text)); margin-top: 4px;">Enables private habit tracking and goal management.</p>
          </div>

          <button id="saveBtn" class="btn-primary" type="submit" style="margin-top: 12px;">Update Configuration</button>
        </form>
      </section>

      <div id="settingsStatus" class="status-toast hidden" style="position: relative; margin: 0 24px 24px; bottom: 0;"></div>
    </main>

    <script src="./options.js"></script>
  </body>
</html>
